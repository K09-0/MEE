name: mee_app
description: MicroExperiential Engine - AI-powered micro-experience marketplace for Gen Z
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Backend as a Service
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  cloud_functions: ^4.5.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.9
  firebase_performance: ^0.9.3+8
  
  # State Management - BLoC Pattern
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Alternative State Management (Riverpod for some modules)
  flutter_riverpod: ^2.4.9
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.3
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Networking & HTTP
  dio: ^5.4.0
  http: ^1.1.2
  retrofit: ^4.0.3
  connectivity_plus: ^5.0.2
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.3.0
  
  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  photo_view: ^0.14.0
  
  # Payments
  flutter_stripe: ^9.5.0+1
  stripe_platform_interface: ^9.4.0
  solana: ^0.30.0
  solana_mobile_client: ^0.0.1
  
  # Crypto & Web3
  web3dart: ^2.7.3
  ed25519_hd_key: ^2.2.1
  bip39: ^1.0.6
  
  # Deep Links & Sharing
  uni_links: ^0.5.1
  share_plus: ^7.2.1
  app_links: ^3.5.0
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  easy_localization: ^3.0.3
  
  # Notifications
  local_auth: ^2.1.8
  
  # Haptic Feedback
  haptic_feedback: ^0.4.0
  vibration: ^1.8.4
  
  # Animation
  animations: ^2.0.11
  simple_animations: ^5.0.2
  
  # Utilities
  uuid: ^4.3.3
  crypto: ^3.0.3
  encrypt: ^5.0.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.2
  
  # Logging & Debugging
  logger: ^2.0.2+1
  talker: ^4.0.3
  talker_bloc_logger: ^4.0.3
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  retrofit_generator: ^8.0.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  
  # Testing
  mockito: ^5.4.4
  
  # Documentation

flutter:
  uses-material-design: true
  
  assets:
    # Images
    - assets/images/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/images/icons/
    
    # Animations
    - assets/animations/
    - assets/animations/loading/
    - assets/animations/success/
    
    # Localization
    - assets/translations/
    
    # Fonts (if using local fonts instead of Google Fonts)
    - assets/fonts/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

# Flutter specific configurations
flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated
  use_deferred_loading: false

# Build configurations
flutter_build:
  split_debug_info: /symbols
  obfuscate: true
  tree-shake-icons: true
